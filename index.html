<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Dialogue System</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --border-color: #333;
            --text-primary: #f1f5f9;
            --text-secondary: #888;
            --accent-blue: #4A90E2;
            --accent-green: #00ff41;
            --accent-orange: #ffaa00;
            --accent-cyan: #00bcd4;
            --accent-red: #ff4444;
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
            --header-height: 56px;
        }

        html, body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-primary); 
            height: 100%; 
            overflow: hidden; 
            color: var(--text-primary);
            line-height: 1.6;
            touch-action: manipulation;
            position: fixed;
            width: 100%;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .main-container { 
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .status-bar { 
            background: var(--bg-secondary); 
            border-bottom: 1px solid var(--border-color); 
            padding: 10px 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            min-height: var(--header-height);
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-shrink: 0;
            width: 100%;
        }

        .status-left { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex: 1; 
            min-width: 0; 
            overflow: hidden;
            flex-wrap: wrap;
        }
        
        .model-selector { 
            position: relative; 
            flex: 1; 
            min-width: 0; 
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .model-selector select { 
            width: 100%;
            font-family: monospace; 
            font-size: 12px; 
            color: var(--accent-blue); 
            background: var(--bg-tertiary); 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            padding: 6px 24px 6px 8px; 
            cursor: pointer; 
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23888' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .custom-model-input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--accent-blue);
            border-radius: 6px;
            padding: 6px 8px;
            color: var(--accent-blue);
            font-family: monospace;
            font-size: 12px;
            outline: none;
            display: none;
            animation: slideDown 0.2s ease;
        }

        .custom-model-input.show {
            display: block;
        }

        .custom-model-input::placeholder {
            color: #555;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-indicator { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-size: 11px; 
            color: var(--text-secondary); 
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; flex-shrink: 0;}
        .status-dot.active { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .status-dot.streaming { background: var(--accent-cyan); animation: pulse 1s infinite; }

        .toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }

        .toolbar-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .toolbar-btn:active { 
            background: rgba(74, 144, 226, 0.2); 
            border-color: var(--accent-blue); 
            color: var(--accent-blue);
            transform: scale(0.95);
        }

        .toolbar-btn.danger:active {
            background: rgba(255, 68, 68, 0.2);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .chat-wrapper {
            overflow-y: auto;
            overflow-x: hidden;
            background: var(--bg-primary);
            position: relative;
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }

        .chat-container { 
            padding: 16px; 
            min-height: 100%;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
        }

        .welcome-screen h1 { 
            font-size: 24px; 
            margin-bottom: 12px; 
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message { 
            display: flex; 
            margin-bottom: 20px; 
            animation: fadeIn 0.3s ease-out;
        }

        .message.user { justify-content: flex-end; }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-right: 8px;
            flex-shrink: 0;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
        }

        .message.user .message-avatar { 
            order: 2; 
            margin-right: 0; 
            margin-left: 8px;
            background: var(--accent-blue);
            color: white;
        }

        .message-content { max-width: 85%; display: flex; flex-direction: column; }

        .message-bubble { 
            padding: 12px 16px; 
            border-radius: 16px; 
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.6;
        }

        .message.user .message-bubble { 
            background: var(--accent-blue); 
            color: white; 
            border-bottom-right-radius: 4px; 
        }

        .message.ai .message-bubble { 
            background: var(--bg-tertiary); 
            color: var(--text-primary); 
            border: 1px solid var(--border-color); 
            border-bottom-left-radius: 4px; 
        }

        .model-tag {
            display: inline-block;
            font-family: monospace;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 6px;
            background: rgba(74, 144, 226, 0.2);
            color: var(--accent-blue);
            border: 1px solid rgba(74, 144, 226, 0.3);
        }

        .thinking-tag {
            display: inline-block;
            font-size: 10px;
            color: var(--accent-orange);
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid rgba(255, 170, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 6px;
        }

        .custom-badge {
            display: inline-block;
            font-size: 10px;
            color: var(--accent-cyan);
            background: rgba(0, 188, 212, 0.1);
            border: 1px solid rgba(0, 188, 212, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 6px;
        }

        .message-footer { 
            font-size: 10px; 
            color: #666; 
            margin-top: 4px; 
            display: flex; 
            justify-content: space-between;
            padding: 0 4px;
        }

        .action-btn { 
            background: transparent; 
            border: 1px solid var(--border-color); 
            color: var(--text-secondary); 
            padding: 2px 8px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 11px; 
        }

        .input-area { 
            background: var(--bg-secondary); 
            border-top: 1px solid var(--border-color); 
            padding: 12px; 
            display: flex; 
            gap: 8px; 
            align-items: flex-end;
            position: sticky;
            bottom: 0;
            z-index: 100;
            width: 100%;
        }

        .message-input { 
            flex: 1;
            min-height: 44px; 
            max-height: 120px; 
            padding: 12px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 22px; 
            font-size: 15px; 
            resize: none; 
            outline: none; 
            background: var(--bg-tertiary); 
            color: var(--text-primary); 
            font-family: inherit;
            line-height: 1.4;
            -webkit-appearance: none;
        }

        .message-input:focus { border-color: var(--accent-blue); }

        .send-btn { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            border: none; 
            cursor: pointer; 
            background: var(--accent-blue); 
            color: white; 
            flex-shrink: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            touch-action: manipulation;
        }

        .send-btn:active { transform: scale(0.9); }
        .send-btn:disabled { background: #333; color: #666; }

        .settings-panel {
            position: fixed;
            top: var(--header-height);
            right: 12px;
            left: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: var(--shadow-md);
            display: none;
            z-index: 2000;
            max-height: calc(100vh - var(--header-height) - 20px);
            overflow-y: auto;
        }

        .settings-panel.show { display: block; }
        .settings-panel h3 { margin-bottom: 12px; font-size: 14px; }
        .setting-item { margin-bottom: 12px; }
        .setting-item label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .setting-item input, .setting-item textarea, .setting-item select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            color: var(--text-primary);
            font-family: monospace;
            font-size: 12px;
            outline: none;
        }
        .setting-item input[type="checkbox"] { width: auto; display: inline-block; margin-right: 6px; }
        .setting-item input[type="range"] { padding: 0; }

        .control-btn { 
            padding: 10px; 
            border: 1px solid var(--border-color); 
            background: var(--bg-tertiary); 
            color: var(--text-primary); 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 13px; 
            width: 100%;
            margin-top: 8px;
        }
        .control-btn.primary { background: var(--accent-blue); border-color: var(--accent-blue); }
        .control-btn.danger { background: rgba(255,68,68,0.1); border-color: var(--accent-red); color: var(--accent-red); }
        .control-btn:active { opacity: 0.8; }

        .apikey-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
        }

        .apikey-modal.show { display: flex; }

        .apikey-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .apikey-content h2 { font-size: 18px; margin-bottom: 8px; }
        .apikey-content p { color: var(--text-secondary); font-size: 13px; margin-bottom: 16px; }
        .apikey-input-group { position: relative; margin-bottom: 16px; }
        .apikey-input-group input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 40px 12px 12px;
            color: var(--text-primary);
            font-family: monospace;
            font-size: 14px;
        }
        .apikey-input-group .toggle-visible {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
        }
        .apikey-actions { display: flex; gap: 10px; }
        .apikey-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
        }
        .apikey-actions button.save { background: var(--accent-blue); border-color: var(--accent-blue); color: white; }

        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 20px;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-primary);
            z-index: 4000;
            min-width: 200px;
            max-width: 90%;
            opacity: 0;
            transition: transform 0.4s ease, opacity 0.4s ease;
            pointer-events: none;
        }

        .toast.show { 
            transform: translateX(-50%) translateY(0); 
            opacity: 1;
        }
        .toast.error { border-left: 3px solid var(--accent-red); }
        .toast.success { border-left: 3px solid var(--accent-green); }

        .typing-indicator { 
            display: flex; 
            gap: 4px; 
            padding: 12px 16px; 
            background: var(--bg-tertiary); 
            border-radius: 16px; 
            border: 1px solid var(--border-color);
            width: fit-content;
            align-items: center;
        }

        .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-blue); animation: bounce 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        pre { background: #1a1a2e; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; border: 1px solid var(--border-color); }
        code { font-family: monospace; font-size: 13px; }
        pre code { color: #abb2bf; }
        p code { background: rgba(74, 144, 226, 0.2); padding: 2px 4px; border-radius: 3px; color: var(--accent-cyan); font-size: 0.9em; }
        blockquote { border-left: 3px solid var(--accent-blue); padding-left: 12px; margin: 8px 0; color: var(--text-secondary); font-style: italic; }
        table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 14px; }
        th, td { border: 1px solid var(--border-color); padding: 6px; text-align: left; }
        th { background: var(--bg-secondary); }

        @media (max-height: 400px) {
            .status-bar { min-height: 48px; padding: 8px; }
            .toolbar-btn { height: 32px; min-width: 32px; }
        }
        
        .token-limit-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 8px;
            background: rgba(0, 188, 212, 0.2);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 188, 212, 0.3);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="status-bar" id="statusBar">
            <div class="status-left">
                <div class="model-selector">
                    <select id="modelSelect">
                        <!-- 6个固定预设模型 -->
                        <option value="gemini-3.1-flash-lite-preview">⚡ Gemini 3.1 Flash Lite</option>
                        <option value="gemini-3.1-pro-preview">💎 Gemini 3.1 Pro</option>
                        <option value="gemini-3.1-pro-preview-thinking">🧠 Gemini 3.1 Pro Thinking</option>
                        <option value="grok-4-fast-non-reasoning">⚡ Grok 4 Fast</option>
                        <option value="grok-4-fast-reasoning">🧠 Grok 4 Fast Reasoning</option>
                        <option value="grok-4-all">🦁 Grok 4 All</option>
                        <!-- 第7个：自定义 -->
                        <option value="custom">✏️ 自定义模型...</option>
                    </select>
                    <input type="text" id="customModelInput" class="custom-model-input" placeholder="输入模型名称，如: claude-3-opus">
                </div>
                <div class="status-indicator">
                    <div class="status-dot active" id="statusDot"></div>
                    <span id="statusText">就绪</span>
                    <span class="token-limit-badge" id="tokenBadge" title="当前输出长度限制">无限制</span>
                </div>
            </div>
            
            <div class="toolbar">
                <button class="toolbar-btn" id="btnApiKey" title="API密钥">🔑</button>
                <button class="toolbar-btn" id="btnSettings" title="设置">⚙️</button>
                <button class="toolbar-btn danger" id="btnClear" title="清空对话">🗑️</button>
                <button class="toolbar-btn" id="btnExport" title="复制全部对话">📋</button>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <h3>⚙️ 设置</h3>
            <div class="setting-item">
                <label>API地址（可选）</label>
                <input type="text" id="customApiUrl" placeholder="https://api.example.com/v1/chat/completions">
            </div>
            <div class="setting-item">
                <label>系统提示词</label>
                <textarea id="systemPrompt" rows="2" placeholder="输入系统提示词..."></textarea>
            </div>
            <div class="setting-item">
                <label>温度: <span id="tempDisplay">0.7</span></label>
                <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
            </div>
            <div class="setting-item">
                <label>最大输出长度 (Max Tokens): <span id="tokenDisplay">无限制</span></label>
                <input type="range" id="maxTokens" min="0" max="32000" step="1000" value="0">
                <small style="color: #666; font-size: 11px; display: block; margin-top: 4px;">
                    0 = 无限制 (让模型自由输出，推荐) | 拖动设置具体数值限制最大长度
                </small>
            </div>
            <div class="setting-item">
                <label style="display: flex; align-items: center; cursor: pointer;">
                    <input type="checkbox" id="showThinking">
                    <span>显示思考过程 (Thinking)</span>
                </label>
            </div>
            <button class="control-btn" id="btnCloseSettings">关闭并保存</button>
        </div>

        <div class="apikey-modal" id="apiKeyModal">
            <div class="apikey-content">
                <h2>🔑 设置 API Key</h2>
                <p>您的密钥将安全保存在本地浏览器中</p>
                <div class="apikey-input-group">
                    <input type="password" id="apiKeyInput" placeholder="sk-...">
                    <button class="toggle-visible" id="btnToggleVisible">👁</button>
                </div>
                <div class="apikey-actions">
                    <button id="btnCancelApiKey">取消</button>
                    <button class="save" id="btnSaveApiKey">保存</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast">
            <span id="toastIcon">✓</span>
            <span id="toastMessage">操作成功</span>
        </div>

        <div class="chat-wrapper" id="chatWrapper">
            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <h1>AI Dialogue</h1>
                    <p style="font-size: 13px; opacity: 0.8;">选择模型 · 设置密钥 · 开始对话<br>自动过滤思考过程</p>
                </div>
            </div>
        </div>

        <div class="input-area" id="inputArea">
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        // 6个固定预设模型配置
        const PRESET_MODELS = {
            'gemini-3.1-flash-lite-preview': { 
                name: 'gemini-3.1-flash-lite-preview', 
                display: 'Gemini 3.1 Flash Lite', 
                icon: '⚡', 
                color: '#5B8FF9', 
                maxTokens: 8000 
            },
            'gemini-3.1-pro-preview': { 
                name: 'gemini-3.1-pro-preview', 
                display: 'Gemini 3.1 Pro', 
                icon: '💎', 
                color: '#4A90E2', 
                maxTokens: 8000 
            },
            'gemini-3.1-pro-preview-thinking': { 
                name: 'gemini-3.1-pro-preview-thinking', 
                display: 'Gemini 3.1 Pro Thinking', 
                icon: '🧠', 
                color: '#3B82F6', 
                maxTokens: 8000, 
                isThinking: true 
            },
            'grok-4-fast-non-reasoning': { 
                name: 'grok-4-fast-non-reasoning', 
                display: 'Grok 4 Fast', 
                icon: '⚡', 
                color: '#ff8c00', 
                maxTokens: 8000 
            },
            'grok-4-fast-reasoning': { 
                name: 'grok-4-fast-reasoning', 
                display: 'Grok 4 Fast Reasoning', 
                icon: '🧠', 
                color: '#ff6b00', 
                maxTokens: 8000,
                isThinking: true 
            },
            'grok-4-all': { 
                name: 'grok-4-all', 
                display: 'Grok 4 All', 
                icon: '🦁', 
                color: '#ff4500', 
                maxTokens: 8000 
            }
        };

        let currentModel = 'gemini-3.1-flash-lite-preview';
        let customModelName = localStorage.getItem('ai_custom_model') || '';
        let isCustomModel = localStorage.getItem('ai_is_custom') === 'true';
        let history = [];
        let apiKey = localStorage.getItem('ai_key') || '';
        let systemPrompt = localStorage.getItem('ai_prompt') || '';
        let customUrl = localStorage.getItem('ai_url') || '';
        let temp = parseFloat(localStorage.getItem('ai_temp')) || 0.7;
        let showThinking = localStorage.getItem('ai_show_thinking') === 'true';
        let maxTokensSetting = parseInt(localStorage.getItem('ai_max_tokens')) || 0;
        let abortCtrl = null;
        let msgId = 0;
        let toastTimeout = null;

        document.addEventListener('DOMContentLoaded', function() {
            init();
        });

        function init() {
            if (systemPrompt) document.getElementById('systemPrompt').value = systemPrompt;
            if (customUrl) document.getElementById('customApiUrl').value = customUrl;
            document.getElementById('temperature').value = temp;
            document.getElementById('tempDisplay').textContent = temp;
            document.getElementById('showThinking').checked = showThinking;
            document.getElementById('maxTokens').value = maxTokensSetting;
            updateTokenDisplay(maxTokensSetting);

            // 恢复自定义模型设置
            if (isCustomModel && customModelName) {
                document.getElementById('modelSelect').value = 'custom';
                document.getElementById('customModelInput').value = customModelName;
                document.getElementById('customModelInput').classList.add('show');
                currentModel = customModelName;
            } else {
                // 检查保存的模型是否在预设中，否则默认第一个
                if (PRESET_MODELS[localStorage.getItem('ai_model')]) {
                    currentModel = localStorage.getItem('ai_model');
                }
                document.getElementById('modelSelect').value = currentModel;
            }

            setupButton('btnApiKey', showApiKey);
            setupButton('btnSettings', toggleSettings);
            setupButton('btnClear', clearChat);
            setupButton('btnExport', copyAllChat);
            setupButton('btnCloseSettings', toggleSettings);
            setupButton('btnCancelApiKey', hideApiKey);
            setupButton('btnSaveApiKey', saveApiKey);
            setupButton('btnToggleVisible', toggleVisible);
            setupButton('sendBtn', sendMessage);
            
            document.getElementById('temperature').addEventListener('input', (e) => {
                document.getElementById('tempDisplay').textContent = e.target.value;
                temp = parseFloat(e.target.value);
            });

            // 模型选择监听
            document.getElementById('modelSelect').addEventListener('change', (e) => {
                const val = e.target.value;
                const customInput = document.getElementById('customModelInput');
                
                if (val === 'custom') {
                    customInput.classList.add('show');
                    customInput.focus();
                    if (customModelName) {
                        customInput.value = customModelName;
                        currentModel = customModelName;
                    }
                    isCustomModel = true;
                    localStorage.setItem('ai_is_custom', 'true');
                    toast('请输入自定义模型名称');
                } else {
                    customInput.classList.remove('show');
                    currentModel = val;
                    isCustomModel = false;
                    localStorage.setItem('ai_is_custom', 'false');
                    localStorage.setItem('ai_model', val);
                    const model = getCurrentModelConfig();
                    toast('已切换: ' + model.display);
                }
            });

            // 自定义模型输入监听
            document.getElementById('customModelInput').addEventListener('input', (e) => {
                const val = e.target.value.trim();
                if (val) {
                    customModelName = val;
                    currentModel = val;
                    localStorage.setItem('ai_custom_model', val);
                }
            });

            document.getElementById('showThinking').addEventListener('change', (e) => {
                showThinking = e.target.checked;
                localStorage.setItem('ai_show_thinking', showThinking);
                toast(showThinking ? '已显示思考过程' : '已隐藏思考过程');
            });

            document.getElementById('maxTokens').addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                maxTokensSetting = val;
                updateTokenDisplay(val);
            });

            const input = document.getElementById('messageInput');
            input.addEventListener('focus', () => setTimeout(() => input.scrollIntoView({ block: 'center', behavior: 'smooth' }), 300));
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            loadHistory();
            if (!apiKey) setTimeout(() => toast('请先设置 API Key', 'warning'), 1000);
        }

        // 获取当前模型配置
        function getCurrentModelConfig() {
            if (isCustomModel || !PRESET_MODELS[currentModel]) {
                return {
                    name: currentModel,
                    display: currentModel,
                    icon: '🔧',
                    color: '#888',
                    maxTokens: 8000,
                    isCustom: true
                };
            }
            return PRESET_MODELS[currentModel];
        }

        function updateTokenDisplay(val) {
            const badge = document.getElementById('tokenBadge');
            const display = document.getElementById('tokenDisplay');
            if (val === 0 || val === '0') {
                display.textContent = '无限制';
                badge.textContent = '无限制';
                badge.style.background = 'rgba(0, 255, 65, 0.2)';
                badge.style.color = 'var(--accent-green)';
                badge.style.borderColor = 'rgba(0, 255, 65, 0.3)';
            } else {
                const k = val >= 1000 ? (val/1000).toFixed(1) + 'k' : val;
                display.textContent = val + ' tokens';
                badge.textContent = k;
                badge.style.background = 'rgba(0, 188, 212, 0.2)';
                badge.style.color = 'var(--accent-cyan)';
                badge.style.borderColor = 'rgba(0, 188, 212, 0.3)';
            }
        }

        function setupButton(id, handler) {
            const btn = document.getElementById(id);
            if (!btn) return;
            
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            
            const execute = (e) => {
                e.preventDefault();
                e.stopPropagation();
                handler();
                newBtn.style.opacity = '0.6';
                setTimeout(() => newBtn.style.opacity = '1', 150);
            };
            
            newBtn.addEventListener('touchstart', execute, {passive: false});
            newBtn.addEventListener('click', execute);
        }

        function showApiKey() {
            document.getElementById('apiKeyInput').value = apiKey;
            document.getElementById('apiKeyModal').classList.add('show');
        }

        function hideApiKey() {
            document.getElementById('apiKeyModal').classList.remove('show');
        }

        function toggleVisible() {
            const input = document.getElementById('apiKeyInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if (!val) return toast('请输入API Key', 'error');
            apiKey = val;
            localStorage.setItem('ai_key', apiKey);
            hideApiKey();
            toast('API Key已保存');
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            if (panel.classList.contains('show')) {
                panel.classList.remove('show');
                systemPrompt = document.getElementById('systemPrompt').value;
                customUrl = document.getElementById('customApiUrl').value;
                localStorage.setItem('ai_prompt', systemPrompt);
                localStorage.setItem('ai_url', customUrl);
                localStorage.setItem('ai_temp', temp);
                localStorage.setItem('ai_max_tokens', maxTokensSetting);
                
                const tokenText = maxTokensSetting === 0 ? '无限制' : maxTokensSetting + ' tokens';
                toast('设置已保存，输出长度: ' + tokenText);
            } else {
                panel.classList.add('show');
            }
        }

        function clearChat() {
            if (!history.length) return toast('没有内容可清空', 'warning');
            
            const userCount = history.filter(h => h.role === 'user').length;
            history = [];
            msgId = 0;
            
            document.getElementById('chatContainer').innerHTML = `
                <div class="welcome-screen" id="welcomeScreen">
                    <h1>AI Dialogue</h1>
                    <p style="font-size: 13px; opacity: 0.8;">选择模型 · 设置密钥 · 开始对话<br>自动过滤思考过程</p>
                </div>
            `;
            localStorage.removeItem('ai_history');
            toast(`已清空 ${userCount} 条对话`);
        }

        function copyAllChat() {
            if (!history.length) return toast('没有可复制的对话内容', 'error');
            
            try {
                let text = `【AI对话记录】\n`;
                text += `时间: ${new Date().toLocaleString('zh-CN')}\n`;
                text += `模型: ${getCurrentModelConfig().display}\n`;
                text += `消息数: ${history.length}\n`;
                text += `${'='.repeat(40)}\n\n`;
                
                history.forEach((h, index) => {
                    const time = new Date(h.time).toLocaleString('zh-CN');
                    if (h.role === 'user') {
                        text += `【用户】${time}\n`;
                        text += `${h.content}\n\n`;
                    } else {
                        const modelName = getCurrentModelConfig().display || 'AI';
                        text += `【${modelName}】${time}\n`;
                        const content = h.rawContent || h.content;
                        text += `${content}\n\n`;
                    }
                    if (index < history.length - 1) {
                        text += `${'-'.repeat(40)}\n\n`;
                    }
                });
                
                navigator.clipboard.writeText(text).then(() => {
                    toast(`已复制全部 ${history.length} 条对话到剪贴板`);
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.left = '-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    const success = document.execCommand('copy');
                    document.body.removeChild(ta);
                    
                    if (success) {
                        toast(`已复制全部 ${history.length} 条对话到剪贴板`);
                    } else {
                        toast('复制失败，请手动选择复制', 'error');
                    }
                });
            } catch (err) {
                toast('复制失败: ' + err.message, 'error');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            if (!apiKey) {
                toast('请先设置API Key', 'error');
                showApiKey();
                return;
            }

            if (isCustomModel && !customModelName) {
                toast('请先输入自定义模型名称', 'error');
                document.getElementById('customModelInput').focus();
                return;
            }

            addMsg(text, true);
            history.push({ role: 'user', content: text, time: Date.now() });
            saveHistory();
            
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('welcomeScreen')?.style?.display && (document.getElementById('welcomeScreen').style.display = 'none');
            
            await getAIResponse();
        }

        function filterThinkingContent(text) {
            if (showThinking) return text;
            text = text.replace(/<thinking>[\s\S]*?<\/thinking>/gi, '');
            text = text.replace(/[\s\S]*?<\/think>/gi, '');
            text = text.replace(/\[思考开始\][\s\S]*?\[思考结束\]/gi, '');
            text = text.replace(/\n{3,}/g, '\n\n');
            return text.trim();
        }

        async function getAIResponse() {
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            setStatus('streaming');
            
            const model = getCurrentModelConfig();
            
            const loader = document.createElement('div');
            loader.className = 'message ai';
            loader.innerHTML = `
                <div class="message-avatar" style="border-color: ${model.color}">${model.icon}</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                        <span style="font-size: 12px; color: var(--text-secondary); margin-left: 6px;">${model.isThinking ? '思考中...' : '生成中...'}</span>
                    </div>
                </div>
            `;
            document.getElementById('chatContainer').appendChild(loader);
            scrollToBottom();
            
            let msgs = [];
            let sysPrompt = systemPrompt;
            if (model.isThinking && !showThinking) {
                sysPrompt = (sysPrompt ? sysPrompt + '\n\n' : '') + '请直接给出最终答案，不要展示思考过程。';
            }
            if (sysPrompt) msgs.push({ role: 'system', content: sysPrompt });
            msgs = msgs.concat(history.map(h => ({ role: h.role, content: h.rawContent || h.content })));
            
            abortCtrl = new AbortController();
            
            try {
                const url = customUrl || 'https://api.laozhang.ai/v1/chat/completions';
                
                const requestBody = {
                    model: model.name,
                    messages: msgs,
                    temperature: temp,
                    stream: true
                };
                
                if (maxTokensSetting > 0) {
                    requestBody.max_tokens = maxTokensSetting;
                }
                
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                    body: JSON.stringify(requestBody),
                    signal: abortCtrl.signal
                });
                
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error?.message || 'HTTP ' + res.status);
                }
                
                loader.remove();
                const bubbleId = 'msg-' + (++msgId);
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ai';
                
                const limitBadge = maxTokensSetting > 0 ? `<span style="font-size:10px;opacity:0.7;margin-left:6px;">(${maxTokensSetting} tokens)</span>` : '<span style="font-size:10px;opacity:0.7;margin-left:6px;">(无限制)</span>';
                
                const modelTag = model.isCustom ? 
                    `<div class="custom-badge">🔧 自定义: ${model.display}</div>` : 
                    `<div class="model-tag" style="background: ${model.color}20; color: ${model.color}; border-color: ${model.color}40">${model.display}</div>`;
                
                msgDiv.innerHTML = `
                    <div class="message-avatar" style="border-color: ${model.color}">${model.icon}</div>
                    <div class="message-content">
                        <div class="message-bubble">
                            ${model.isThinking ? '<div class="thinking-tag" id="tag-' + bubbleId + '">已隐藏思考过程</div>' : modelTag}
                            <div id="${bubbleId}"></div>
                        </div>
                        <div class="message-footer">
                            <button class="action-btn" onclick="copyText('${bubbleId}')">复制</button>
                            <span style="font-size: 10px;">${new Date().toLocaleTimeString()} ${limitBadge}</span>
                        </div>
                    </div>
                `;
                document.getElementById('chatContainer').appendChild(msgDiv);
                
                const contentDiv = document.getElementById(bubbleId);
                let rawText = '';
                let displayText = '';
                let tokens = 0;
                let isTruncated = false;
                
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (!line.startsWith('data: ') || line.includes('[DONE]')) continue;
                        
                        try {
                            const data = JSON.parse(line.slice(6));
                            
                            if (data.choices?.[0]?.finish_reason === 'length') {
                                isTruncated = true;
                            }
                            
                            const delta = data.choices[0]?.delta?.content;
                            if (delta) {
                                rawText += delta;
                                tokens += Math.ceil(delta.length / 4);
                                displayText = filterThinkingContent(rawText);
                                
                                if (model.isThinking && !showThinking && rawText.length > displayText.length + 50) {
                                    const tag = document.getElementById('tag-' + bubbleId);
                                    if (tag) tag.textContent = '已过滤思考过程';
                                }
                                
                                if (displayText) {
                                    contentDiv.innerHTML = marked.parse(displayText);
                                    contentDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                                    scrollToBottom();
                                }
                            }
                        } catch (e) {}
                    }
                }
                
                if (isTruncated && maxTokensSetting > 0) {
                    const truncatedDiv = document.createElement('div');
                    truncatedDiv.style.cssText = 'margin-top:8px;padding:8px;border-left:3px solid var(--accent-orange);background:rgba(255,170,0,0.1);border-radius:4px;font-size:12px;color:var(--accent-orange);';
                    truncatedDiv.innerHTML = '⚠️ 输出已达到长度限制（' + maxTokensSetting + ' tokens），建议在设置中调大"最大输出长度"以获得完整回复';
                    contentDiv.appendChild(truncatedDiv);
                }
                
                history.push({
                    role: 'assistant',
                    content: displayText || rawText,
                    rawContent: rawText,
                    model: currentModel,
                    isCustom: isCustomModel,
                    time: Date.now(),
                    isTruncated: isTruncated
                });
                saveHistory();
                
                const finishMsg = isTruncated ? '输出已截断，建议增加长度限制' : '完成 · ' + tokens + ' tokens';
                toast(finishMsg, isTruncated ? 'warning' : 'success');
                
            } catch (err) {
                loader.remove();
                if (err.name !== 'AbortError') {
                    addMsg('❌ 错误: ' + err.message, false, 'error');
                    toast(err.message, 'error');
                }
            } finally {
                btn.disabled = false;
                setStatus('idle');
                abortCtrl = null;
            }
        }

        function addMsg(content, isUser, err) {
            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'user' : 'ai');
            const id = 'm' + (++msgId);
            
            if (isUser) {
                div.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        <div class="message-bubble">${marked.parse(content)}</div>
                        <div class="message-footer" style="justify-content: flex-end;">
                            <span style="font-size: 10px;">${new Date().toLocaleTimeString()}</span>
                        </div>
                    </div>
                `;
            } else {
                const model = getCurrentModelConfig();
                const color = err ? '#ff4444' : model.color;
                const icon = err ? '⚠️' : model.icon;
                div.innerHTML = `
                    <div class="message-avatar" style="border-color: ${color}">${icon}</div>
                    <div class="message-content">
                        <div class="message-bubble" style="${err ? 'border-color: #ff4444; background: rgba(255,68,68,0.1);' : ''}">
                            ${err ? '' : (model.isCustom ? `<div class="custom-badge">🔧 ${model.display}</div>` : `<div class="model-tag" style="background: ${color}20; color: ${color}; border-color: ${color}40">${model.display}</div>`)}
                            <div id="${id}">${marked.parse(content)}</div>
                        </div>
                        <div class="message-footer">
                            ${err ? '' : '<button class="action-btn" onclick="copyText(\'' + id + '\')">复制</button>'}
                            <span style="font-size: 10px;">${new Date().toLocaleTimeString()}</span>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('chatContainer').appendChild(div);
            scrollToBottom();
        }

        function copyText(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const text = el.textContent;
            navigator.clipboard.writeText(text).then(() => toast('已复制')).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                toast('已复制');
            });
        }

        function scrollToBottom() {
            document.getElementById('chatWrapper').scrollTop = 1e9;
        }

        function setStatus(s) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            dot.className = 'status-dot';
            if (s === 'idle') {
                dot.classList.add('active');
                txt.textContent = '就绪';
            } else if (s === 'streaming') {
                dot.classList.add('streaming');
                txt.textContent = '生成中...';
            }
        }

        function toast(msg, type) {
            const t = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            
            if (toastTimeout) {
                clearTimeout(toastTimeout);
            }
            
            t.classList.remove('show');
            void t.offsetWidth;
            
            t.className = 'toast ' + (type || 'success');
            icon.textContent = type === 'error' ? '✗' : (type === 'warning' ? '⚠' : '✓');
            document.getElementById('toastMessage').textContent = msg;
            
            t.classList.add('show');
            
            toastTimeout = setTimeout(() => {
                t.classList.remove('show');
            }, 3000);
        }

        function saveHistory() {
            localStorage.setItem('ai_history', JSON.stringify(history.slice(-50)));
        }

        function loadHistory() {
            const saved = localStorage.getItem('ai_history');
            if (saved) {
                try {
                    history = JSON.parse(saved);
                    if (history.length) {
                        document.getElementById('welcomeScreen').style.display = 'none';
                        history.forEach(h => {
                            if (h.role === 'user') {
                                const div = document.createElement('div');
                                div.className = 'message user';
                                div.innerHTML = `
                                    <div class="message-avatar">👤</div>
                                    <div class="message-content">
                                        <div class="message-bubble">${marked.parse(h.content)}</div>
                                        <div class="message-footer" style="justify-content: flex-end;">
                                            <span style="font-size: 10px;">${new Date(h.time).toLocaleTimeString()}</span>
                                        </div>
                                    </div>
                                `;
                                document.getElementById('chatContainer').appendChild(div);
                            } else {
                                const isCustomHist = h.isCustom || !PRESET_MODELS[h.model];
                                const histModel = isCustomHist ? {
                                    display: h.model,
                                    icon: '🔧',
                                    color: '#888',
                                    isCustom: true
                                } : PRESET_MODELS[h.model];
                                
                                const isFiltered = h.rawContent && h.rawContent !== h.content;
                                const limitBadge = maxTokensSetting > 0 ? `<span style="font-size:10px;opacity:0.7;margin-left:6px;">(${maxTokensSetting} tokens)</span>` : '';
                                const div = document.createElement('div');
                                div.className = 'message ai';
                                div.innerHTML = `
                                    <div class="message-avatar" style="border-color: ${histModel.color}">${histModel.icon}</div>
                                    <div class="message-content">
                                        <div class="message-bubble">
                                            ${isFiltered ? '<div class="thinking-tag">已过滤思考过程</div>' : (isCustomHist ? `<div class="custom-badge">🔧 ${histModel.display}</div>` : `<div class="model-tag" style="background: ${histModel.color}20; color: ${histModel.color}; border-color: ${histModel.color}40">${histModel.display}</div>`)}
                                            <div>${marked.parse(h.content || h.rawContent)}</div>
                                        </div>
                                        <div class="message-footer">
                                            <button class="action-btn" onclick="copyText(this.parentElement.parentElement.querySelector('div:last-child')?.id || '')">复制</button>
                                            <span style="font-size: 10px;">${new Date(h.time).toLocaleTimeString()} ${limitBadge}</span>
                                        </div>
                                    </div>
                                `;
                                document.getElementById('chatContainer').appendChild(div);
                            }
                        });
                        setTimeout(scrollToBottom, 100);
                    }
                } catch (e) {}
            }
        }

        window.addEventListener('beforeunload', (e) => {
            if (history.length) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
