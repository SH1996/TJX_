<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Dialogue System</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --border-color: #333;
            --text-primary: #f1f5f9;
            --text-secondary: #888;
            --accent-blue: #4A90E2;
            --accent-green: #00ff41;
            --accent-orange: #ffaa00;
            --accent-cyan: #00bcd4;
            --accent-red: #ff4444;
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-primary); 
            height: 100vh; 
            overflow: hidden; 
            color: var(--text-primary);
            line-height: 1.6;
            touch-action: manipulation;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .main-container { display: flex; flex-direction: column; height: 100vh; position: relative; }

        .status-bar { 
            background: var(--bg-secondary); 
            border-bottom: 1px solid var(--border-color); 
            padding: 10px 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            min-height: 56px; 
            flex-wrap: wrap; 
            gap: 8px;
            position: relative;
            z-index: 100;
        }

        .status-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
        
        .model-selector { position: relative; flex: 1; min-width: 0; }

        .model-selector select { 
            width: 100%;
            font-family: monospace; 
            font-size: 12px; 
            color: var(--accent-blue); 
            background: var(--bg-tertiary); 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            padding: 6px 24px 6px 8px; 
            cursor: pointer; 
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23888' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
        }

        .status-indicator { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-size: 12px; 
            color: var(--text-secondary); 
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
        .status-dot.active { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .status-dot.streaming { background: var(--accent-cyan); animation: pulse 1s infinite; }

        .toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .toolbar-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-width: 36px;
            height: 36px;
            touch-action: manipulation;
        }

        .toolbar-btn:active { 
            background: rgba(74, 144, 226, 0.2); 
            border-color: var(--accent-blue); 
            color: var(--accent-blue);
            transform: scale(0.95);
        }

        .settings-panel {
            position: absolute;
            top: 56px;
            right: 12px;
            left: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: var(--shadow-md);
            display: none;
            z-index: 1000;
        }

        .settings-panel.show { display: block; }
        .settings-panel h3 { margin-bottom: 12px; font-size: 14px; }
        .setting-item { margin-bottom: 12px; }
        .setting-item label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .setting-item input, .setting-item textarea, .setting-item select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            color: var(--text-primary);
            font-family: monospace;
            font-size: 12px;
            outline: none;
        }
        .setting-item input[type="range"] { padding: 0; }

        .control-btn { 
            padding: 10px; 
            border: 1px solid var(--border-color); 
            background: var(--bg-tertiary); 
            color: var(--text-primary); 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 13px; 
            width: 100%;
            margin-top: 8px;
            touch-action: manipulation;
        }

        .control-btn.primary { background: var(--accent-blue); border-color: var(--accent-blue); }
        .control-btn:active { opacity: 0.8; }

        .apikey-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .apikey-modal.show { display: flex; }

        .apikey-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
        }

        .apikey-content h2 { font-size: 18px; margin-bottom: 8px; }
        .apikey-content p { color: var(--text-secondary); font-size: 13px; margin-bottom: 16px; }
        
        .apikey-input-group { position: relative; margin-bottom: 16px; }
        .apikey-input-group input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 40px 12px 12px;
            color: var(--text-primary);
            font-family: monospace;
            font-size: 14px;
        }
        .apikey-input-group .toggle-visible {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
        }

        .apikey-actions {
            display: flex;
            gap: 10px;
        }

        .apikey-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            touch-action: manipulation;
        }

        .apikey-actions button.save {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 16px; 
            background: var(--bg-primary);
            -webkit-overflow-scrolling: touch;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-secondary);
            padding: 20px;
        }

        .welcome-screen h1 { 
            font-size: 24px; 
            margin-bottom: 12px; 
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message { 
            display: flex; 
            margin-bottom: 20px; 
            animation: fadeIn 0.3s ease-out;
        }

        .message.user { justify-content: flex-end; }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-right: 8px;
            flex-shrink: 0;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
        }

        .message.user .message-avatar { 
            order: 2; 
            margin-right: 0; 
            margin-left: 8px;
            background: var(--accent-blue);
            color: white;
        }

        .message-content { max-width: 85%; display: flex; flex-direction: column; }

        .message-bubble { 
            padding: 12px 16px; 
            border-radius: 16px; 
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.6;
        }

        .message.user .message-bubble { 
            background: var(--accent-blue); 
            color: white; 
            border-bottom-right-radius: 4px; 
        }

        .message.ai .message-bubble { 
            background: var(--bg-tertiary); 
            color: var(--text-primary); 
            border: 1px solid var(--border-color); 
            border-bottom-left-radius: 4px; 
        }

        .model-tag {
            display: inline-block;
            font-family: monospace;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 6px;
            background: rgba(74, 144, 226, 0.2);
            color: var(--accent-blue);
            border: 1px solid rgba(74, 144, 226, 0.3);
        }

        .message-footer { 
            font-size: 10px; 
            color: #666; 
            margin-top: 4px; 
            display: flex; 
            justify-content: space-between;
            padding: 0 4px;
        }

        .action-btn { 
            background: transparent; 
            border: 1px solid var(--border-color); 
            color: var(--text-secondary); 
            padding: 2px 8px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 11px; 
            margin-right: 6px;
        }

        .input-area { 
            background: var(--bg-secondary); 
            border-top: 1px solid var(--border-color); 
            padding: 12px; 
            display: flex; 
            gap: 8px; 
            align-items: flex-end;
        }

        .message-input { 
            flex: 1;
            min-height: 44px; 
            max-height: 120px; 
            padding: 12px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 22px; 
            font-size: 15px; 
            resize: none; 
            outline: none; 
            background: var(--bg-tertiary); 
            color: var(--text-primary); 
            font-family: inherit;
            line-height: 1.4;
        }

        .message-input:focus { border-color: var(--accent-blue); }

        .send-btn { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            border: none; 
            cursor: pointer; 
            background: var(--accent-blue); 
            color: white; 
            flex-shrink: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            touch-action: manipulation;
        }

        .send-btn:active { transform: scale(0.9); }
        .send-btn:disabled { background: #333; color: #666; }

        .toast {
            position: fixed;
            top: 70px;
            right: 12px;
            left: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-primary);
            z-index: 3000;
            transform: translateY(-100px);
            transition: transform 0.3s ease;
            max-width: 400px;
            margin: 0 auto;
        }

        .toast.show { transform: translateY(0); }
        .toast.error { border-left: 3px solid var(--accent-red); }
        .toast.success { border-left: 3px solid var(--accent-green); }

        .typing-indicator { 
            display: flex; 
            gap: 4px; 
            padding: 12px 16px; 
            background: var(--bg-tertiary); 
            border-radius: 16px; 
            border: 1px solid var(--border-color);
            width: fit-content;
            align-items: center;
        }

        .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-blue); animation: bounce 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        pre { background: #1a1a2e; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; border: 1px solid var(--border-color); }
        code { font-family: monospace; font-size: 13px; }
        pre code { color: #abb2bf; }
        p code { background: rgba(74, 144, 226, 0.2); padding: 2px 4px; border-radius: 3px; color: var(--accent-cyan); font-size: 0.9em; }
        blockquote { border-left: 3px solid var(--accent-blue); padding-left: 12px; margin: 8px 0; color: var(--text-secondary); font-style: italic; }
        table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 14px; }
        th, td { border: 1px solid var(--border-color); padding: 6px; text-align: left; }
        th { background: var(--bg-secondary); }
        
        .thinking-tag {
            display: inline-block;
            font-size: 10px;
            color: var(--accent-orange);
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid rgba(255, 170, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="status-bar">
            <div class="status-left">
                <div class="model-selector" style="flex: 1;">
                    <select id="modelSelect">
                        <option value="gemini-3.1-pro-preview-thinking">💎 Gemini 3.1 Pro Thinking</option>
                        <option value="gemini-3.1-pro-preview">💠 Gemini 3.1 Pro</option>
                        <option value="gpt-5.4-mini">⚡ GPT-5.4 Mini</option>
                        <option value="gpt-5.4-nano">🔹 GPT-5.4 Nano</option>
                        <option value="gpt-5.4-pro">🌟 GPT-5.4 Pro</option>
                        <option value="grok-4-all">🦁 Grok 4 All</option>
                        <option value="MiniMax-M2.7">🎭 MiniMax M2.7</option>
                        <option value="deepseek-v3.2-thinking">🐋 DeepSeek V3.2 Thinking</option>
                        <option value="claude-opus-4-6-thinking">🎪 Claude Opus 4.6 Thinking</option>
                        <option value="claude-sonnet-4-6">🎨 Claude Sonnet 4.6</option>
                    </select>
                </div>
                <div class="status-indicator">
                    <div class="status-dot active" id="statusDot"></div>
                    <span id="statusText" style="font-size: 11px;">就绪</span>
                </div>
            </div>
            
            <div class="toolbar">
                <button class="toolbar-btn" id="btnApiKey" title="API密钥">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
                    </svg>
                </button>
                <button class="toolbar-btn" id="btnSettings" title="设置">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 17.66l-4.24 4.24M23 12h-6m-6 0H1m20.07 4.93l-4.24-4.24M6.34 6.34L2.1 2.1"></path>
                    </svg>
                </button>
                <button class="toolbar-btn" id="btnClear" title="清空">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
                <button class="toolbar-btn" id="btnExport" title="导出">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <h3>⚙️ 设置</h3>
            <div class="setting-item">
                <label>API地址（可选）</label>
                <input type="text" id="customApiUrl" placeholder="https://api.example.com/v1/chat/completions">
            </div>
            <div class="setting-item">
                <label>系统提示词</label>
                <textarea id="systemPrompt" rows="2" placeholder="输入系统提示词..."></textarea>
            </div>
            <div class="setting-item">
                <label>温度: <span id="tempDisplay">0.7</span></label>
                <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
            </div>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="showThinking" style="width: auto; margin-right: 6px;">
                    显示思考过程 (Thinking)
                </label>
                <div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">
                    默认隐藏模型的推理过程，只显示最终答案
                </div>
            </div>
            <button class="control-btn" id="btnCloseSettings">关闭</button>
        </div>

        <div class="apikey-modal" id="apiKeyModal">
            <div class="apikey-content">
                <h2>🔑 设置 API Key</h2>
                <p>您的密钥将保存在本地浏览器中</p>
                <div class="apikey-input-group">
                    <input type="password" id="apiKeyInput" placeholder="sk-...">
                    <button class="toggle-visible" id="btnToggleVisible">👁</button>
                </div>
                <div class="apikey-actions">
                    <button id="btnCancelApiKey">取消</button>
                    <button class="save" id="btnSaveApiKey">保存</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast">
            <span id="toastIcon">✓</span>
            <span id="toastMessage">操作成功</span>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <h1>AI Dialogue</h1>
                <p style="font-size: 13px; opacity: 0.8;">选择模型 · 设置密钥 · 开始对话<br>自动过滤思考过程，只显示最终答案</p>
            </div>
        </div>

        <div class="input-area">
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // 模型配置
        const MODELS = {
            'gemini-3.1-pro-preview-thinking': { name: 'gemini-3.1-pro-preview-thinking', display: 'Gemini 3.1 Pro Thinking', icon: '💎', color: '#4A90E2', maxTokens: 8000, isThinking: true },
            'gemini-3.1-pro-preview': { name: 'gemini-3.1-pro-preview', display: 'Gemini 3.1 Pro', icon: '💠', color: '#5B8FF9', maxTokens: 8000 },
            'gpt-5.4-mini': { name: 'gpt-5.4-mini', display: 'GPT-5.4 Mini', icon: '⚡', color: '#10a37f', maxTokens: 4000 },
            'gpt-5.4-nano': { name: 'gpt-5.4-nano', display: 'GPT-5.4 Nano', icon: '🔹', color: '#19c59f', maxTokens: 4000 },
            'gpt-5.4-pro': { name: 'gpt-5.4-pro', display: 'GPT-5.4 Pro', icon: '🌟', color: '#0d8b6d', maxTokens: 8000 },
            'grok-4-all': { name: 'grok-4-all', display: 'Grok 4 All', icon: '🦁', color: '#ff6b00', maxTokens: 8000 },
            'MiniMax-M2.7': { name: 'MiniMax-M2.7', display: 'MiniMax M2.7', icon: '🎭', color: '#e91e63', maxTokens: 4000 },
            'deepseek-v3.2-thinking': { name: 'deepseek-v3.2-thinking', display: 'DeepSeek V3.2 Thinking', icon: '🐋', color: '#4b5563', maxTokens: 8000, isThinking: true },
            'claude-opus-4-6-thinking': { name: 'claude-opus-4-6-thinking', display: 'Claude Opus 4.6 Thinking', icon: '🎪', color: '#d97757', maxTokens: 8000, isThinking: true },
            'claude-sonnet-4-6': { name: 'claude-sonnet-4-6', display: 'Claude Sonnet 4.6', icon: '🎨', color: '#cc785c', maxTokens: 4000 }
        };

        let currentModel = 'gemini-3.1-pro-preview-thinking';
        let history = [];
        let apiKey = localStorage.getItem('ai_key') || '';
        let systemPrompt = localStorage.getItem('ai_prompt') || '';
        let customUrl = localStorage.getItem('ai_url') || '';
        let temp = parseFloat(localStorage.getItem('ai_temp')) || 0.7;
        let showThinking = localStorage.getItem('ai_show_thinking') === 'true';
        let abortCtrl = null;
        let msgId = 0;

        document.addEventListener('DOMContentLoaded', function() {
            init();
        });

        function init() {
            // 加载设置
            if (systemPrompt) document.getElementById('systemPrompt').value = systemPrompt;
            if (customUrl) document.getElementById('customApiUrl').value = customUrl;
            document.getElementById('temperature').value = temp;
            document.getElementById('tempDisplay').textContent = temp;
            document.getElementById('modelSelect').value = currentModel;
            document.getElementById('showThinking').checked = showThinking;

            // 绑定事件
            bindEvent('btnApiKey', showApiKey);
            bindEvent('btnSettings', toggleSettings);
            bindEvent('btnClear', clearChat);
            bindEvent('btnExport', exportChat);
            bindEvent('btnCloseSettings', toggleSettings);
            bindEvent('btnCancelApiKey', hideApiKey);
            bindEvent('btnSaveApiKey', saveApiKey);
            bindEvent('btnToggleVisible', toggleVisible);
            bindEvent('sendBtn', sendMessage);
            
            document.getElementById('temperature').addEventListener('input', function(e) {
                document.getElementById('tempDisplay').textContent = e.target.value;
                temp = parseFloat(e.target.value);
            });

            document.getElementById('modelSelect').addEventListener('change', function(e) {
                currentModel = e.target.value;
                showToast('已切换: ' + MODELS[currentModel].display);
            });

            document.getElementById('showThinking').addEventListener('change', function(e) {
                showThinking = e.target.checked;
                localStorage.setItem('ai_show_thinking', showThinking);
                showToast(showThinking ? '已显示思考过程' : '已隐藏思考过程');
            });

            const input = document.getElementById('messageInput');
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            loadHistory();
            
            if (!apiKey) {
                setTimeout(() => showToast('请先点击右上角钥匙图标设置API Key', 'warning'), 1000);
            }
        }

        function bindEvent(id, handler) {
            const btn = document.getElementById(id);
            if (!btn) return;
            
            btn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                handler();
                this.style.opacity = '0.6';
                setTimeout(() => this.style.opacity = '1', 100);
            }, {passive: false});
            
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                handler();
            });
        }

        function showApiKey() {
            document.getElementById('apiKeyInput').value = apiKey;
            document.getElementById('apiKeyModal').classList.add('show');
        }

        function hideApiKey() {
            document.getElementById('apiKeyModal').classList.remove('show');
        }

        function toggleVisible() {
            const input = document.getElementById('apiKeyInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if (!val) {
                showToast('请输入API Key', 'error');
                return;
            }
            apiKey = val;
            localStorage.setItem('ai_key', apiKey);
            hideApiKey();
            showToast('API Key已保存');
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('show');
            systemPrompt = document.getElementById('systemPrompt').value;
            customUrl = document.getElementById('customApiUrl').value;
            localStorage.setItem('ai_prompt', systemPrompt);
            localStorage.setItem('ai_url', customUrl);
            localStorage.setItem('ai_temp', temp);
        }

        function clearChat() {
            if (history.length === 0) return;
            if (confirm('确定清空所有对话？')) {
                history = [];
                msgId = 0;
                document.getElementById('chatContainer').innerHTML = `
                    <div class="welcome-screen" id="welcomeScreen">
                        <h1>AI Dialogue</h1>
                        <p style="font-size: 13px; opacity: 0.8;">选择模型 · 设置密钥 · 开始对话<br>自动过滤思考过程，只显示最终答案</p>
                    </div>
                `;
                localStorage.removeItem('ai_history');
                showToast('对话已清空');
            }
        }

        function exportChat() {
            if (history.length === 0) {
                showToast('没有可导出的内容', 'error');
                return;
            }
            let md = `# AI对话记录\n\n**时间**: ${new Date().toLocaleString()}\n**模型**: ${MODELS[currentModel].display}\n\n---\n\n`;
            
            history.forEach(h => {
                const time = new Date(h.time).toLocaleTimeString();
                if (h.role === 'user') {
                    md += `## 👤 用户 [${time}]\n\n${h.content}\n\n`;
                } else {
                    md += `## 🤖 ${MODELS[h.model]?.display || 'AI'} [${time}]\n\n${h.rawContent || h.content}\n\n`;
                }
                md += `---\n\n`;
            });
            
            const blob = new Blob([md], {type: 'text/markdown'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat-${new Date().toISOString().slice(0,10)}.md`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
            showToast('已导出Markdown');
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            if (!apiKey) {
                showToast('请先设置API Key', 'error');
                showApiKey();
                return;
            }

            addMsg(text, true);
            history.push({role: 'user', content: text, time: Date.now()});
            saveHistory();
            
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('welcomeScreen')?.style?.display && (document.getElementById('welcomeScreen').style.display = 'none');
            
            await getAIResponse();
        }

        // 过滤思考过程的核心函数
        function filterThinkingContent(text) {
            if (showThinking) return text; // 如果用户选择显示，则不过滤
            
            // 1. 过滤 <think>...</think> 标签 (DeepSeek, QwQ等)
            // 使用非贪婪匹配，但要考虑可能跨行
            text = text.replace(/<think>[\s\S]*?<\/think>/gi, '');
            
            // 2. 过滤 <thinking>...</thinking> 标签 (Claude等可能使用)
            text = text.replace(/<thinking>[\s\S]*?<\/thinking>/gi, '');
            
            // 3. 过滤常见的思考标记
            // 例如: "Thinking:", "Analysis:", "Let me think...", "Step 1:", 等引导的段落
            const thinkingPatterns = [
                /^thinking\s*[:：]\s*[\s\S]*?(?=\n\n|\Z)/gim,
                /^analysis\s*[:：]\s*[\s\S]*?(?=\n\n|\Z)/gim,
                /^reasoning\s*[:：]\s*[\s\S]*?(?=\n\n|\Z)/gim,
                /^let me think[\s\S]*?(?=\n\n|\Z)/gim,
                /^step \d+[\s\S]*?(?=step \d+|\Z)/gim,
                /^\*\*thinking\*\*[\s\S]*?(?=\*\*final answer\*\*|\Z)/gim,
                /^\*\*analysis\*\*[\s\S]*?(?=\*\*final answer\*\*|\Z)/gim,
            ];
            
            thinkingPatterns.forEach(pattern => {
                text = text.replace(pattern, '');
            });
            
            // 4. 清理空行
            text = text.replace(/\n{3,}/g, '\n\n');
            
            // 5. 如果过滤后只剩空白，返回原内容（避免误伤）
            if (!text.trim()) {
                return text; // 或者返回提示说明内容被过滤
            }
            
            return text.trim();
        }

        async function getAIResponse() {
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            setStatus('streaming');
            
            const model = MODELS[currentModel];
            
            // 加载动画
            const loaderId = 'load-' + Date.now();
            const loader = document.createElement('div');
            loader.className = 'message ai';
            loader.id = loaderId;
            loader.innerHTML = `
                <div class="message-avatar" style="border-color: ${model.color}">${model.icon}</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <span style="font-size: 12px; color: var(--text-secondary); margin-left: 6px;">${model.isThinking ? '思考中...' : '生成中...'}</span>
                    </div>
                </div>
            `;
            document.getElementById('chatContainer').appendChild(loader);
            scrollToBottom();
            
            let msgs = [];
            // 对于思考模型，添加提示要求结构化输出（可选，视API支持而定）
            let sysPrompt = systemPrompt;
            if (model.isThinking && !showThinking) {
                sysPrompt = (sysPrompt ? sysPrompt + '\n\n' : '') + '请直接给出最终答案，不要展示思考过程。';
            }
            if (sysPrompt) msgs.push({role: 'system', content: sysPrompt});
            msgs = msgs.concat(history.map(h => ({role: h.role, content: h.rawContent || h.content})));
            
            abortCtrl = new AbortController();
            
            try {
                const url = customUrl || 'https://api.laozhang.ai/v1/chat/completions';
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + apiKey
                    },
                    body: JSON.stringify({
                        model: model.name,
                        messages: msgs,
                        max_tokens: model.maxTokens,
                        temperature: temp,
                        stream: true
                    }),
                    signal: abortCtrl.signal
                });
                
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error?.message || '请求失败: ' + res.status);
                }
                
                loader.remove();
                const bubbleId = 'msg-' + (++msgId);
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ai';
                msgDiv.innerHTML = `
                    <div class="message-avatar" style="border-color: ${model.color}">${model.icon}</div>
                    <div class="message-content">
                        <div class="message-bubble">
                            ${model.isThinking ? '<div class="thinking-tag" id="tag-' + bubbleId + '">已隐藏思考过程</div>' : '<div class="model-tag" style="background: ' + model.color + '20; color: ' + model.color + '; border-color: ' + model.color + '40">' + model.display + '</div>'}
                            <div id="${bubbleId}"></div>
                        </div>
                        <div class="message-footer">
                            <button class="action-btn" onclick="copyText('${bubbleId}')">复制</button>
                            <span style="font-size: 10px;">${new Date().toLocaleTimeString()}</span>
                        </div>
                    </div>
                `;
                document.getElementById('chatContainer').appendChild(msgDiv);
                
                const contentDiv = document.getElementById(bubbleId);
                let rawText = ''; // 原始完整内容（含思考过程）
                let displayText = ''; // 过滤后显示的内容
                let tokens = 0;
                
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (!line.startsWith('data: ') || line.includes('[DONE]')) continue;
                        
                        try {
                            const data = JSON.parse(line.slice(6));
                            const delta = data.choices[0]?.delta?.content;
                            if (delta) {
                                rawText += delta;
                                tokens += Math.ceil(delta.length / 4);
                                
                                // 实时过滤思考过程用于显示
                                displayText = filterThinkingContent(rawText);
                                
                                // 如果有内容被过滤，更新提示标签
                                if (model.isThinking && !showThinking && rawText.length > displayText.length + 100) {
                                    const tag = document.getElementById('tag-' + bubbleId);
                                    if (tag) tag.textContent = '已过滤思考过程';
                                }
                                
                                // 只有当有内容可显示时才更新DOM
                                if (displayText) {
                                    contentDiv.innerHTML = marked.parse(displayText);
                                    contentDiv.querySelectorAll('pre code').forEach(block => {
                                        hljs.highlightElement(block);
                                    });
                                    scrollToBottom();
                                }
                            }
                        } catch(e) {}
                    }
                }
                
                // 最终保存：rawContent保存原始内容（含思考过程），content保存过滤后的
                history.push({
                    role: 'assistant', 
                    content: displayText || rawText, // 如果过滤后为空，保存原始内容
                    rawContent: rawText, // 始终保存原始完整内容
                    model: currentModel,
                    time: Date.now()
                });
                saveHistory();
                showToast('生成完成 · ' + tokens + ' tokens');
                
            } catch(err) {
                loader.remove();
                if (err.name === 'AbortError') {
                    showToast('已停止', 'warning');
                } else {
                    addMsg('❌ 错误: ' + err.message, false, 'error');
                    console.error(err);
                }
            } finally {
                btn.disabled = false;
                setStatus('idle');
                abortCtrl = null;
            }
        }

        function addMsg(content, isUser, type) {
            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'user' : 'ai');
            const id = 'm' + (++msgId);
            
            if (isUser) {
                div.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        <div class="message-bubble">${marked.parse(content)}</div>
                        <div class="message-footer" style="justify-content: flex-end;">
                            <span style="font-size: 10px;">${new Date().toLocaleTimeString()}</span>
                        </div>
                    </div>
                `;
            } else {
                const model = MODELS[currentModel];
                const color = type === 'error' ? '#ff4444' : model.color;
                const icon = type === 'error' ? '⚠️' : model.icon;
                div.innerHTML = `
                    <div class="message-avatar" style="border-color: ${color}">${icon}</div>
                    <div class="message-content">
                        <div class="message-bubble" style="${type === 'error' ? 'border-color: #ff4444; background: rgba(255,68,68,0.1);' : ''}">
                            ${type !== 'error' ? `<div class="model-tag" style="background: ${color}20; color: ${color}; border-color: ${color}40">${model.display}</div>` : ''}
                            <div id="${id}">${marked.parse(content)}</div>
                        </div>
                        <div class="message-footer">
                            ${type !== 'error' ? `<button class="action-btn" onclick="copyText('${id}')">复制</button>` : ''}
                            <span style="font-size: 10px;">${new Date().toLocaleTimeString()}</span>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('chatContainer').appendChild(div);
            scrollToBottom();
        }

        function copyText(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const text = el.textContent;
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('已复制');
            });
        }

        function scrollToBottom() {
            const c = document.getElementById('chatContainer');
            c.scrollTop = c.scrollHeight;
        }

        function setStatus(s) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            dot.className = 'status-dot';
            if (s === 'idle') {
                dot.classList.add('active');
                txt.textContent = '就绪';
            } else if (s === 'streaming') {
                dot.classList.add('streaming');
                txt.textContent = '生成中...';
            }
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            t.className = 'toast ' + (type || 'success');
            icon.textContent = type === 'error' ? '✗' : (type === 'warning' ? '⚠' : '✓');
            document.getElementById('toastMessage').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function saveHistory() {
            localStorage.setItem('ai_history', JSON.stringify(history.slice(-50)));
        }

        function loadHistory() {
            const saved = localStorage.getItem('ai_history');
            if (saved) {
                try {
                    history = JSON.parse(saved);
                    if (history.length > 0) {
                        document.getElementById('welcomeScreen').style.display = 'none';
                        history.forEach(h => {
                            if (h.role === 'user') {
                                const div = document.createElement('div');
                                div.className = 'message user';
                                div.innerHTML = `
                                    <div class="message-avatar">👤</div>
                                    <div class="message-content">
                                        <div class="message-bubble">${marked.parse(h.content)}</div>
                                        <div class="message-footer" style="justify-content: flex-end;">
                                            <span style="font-size: 10px;">${new Date(h.time).toLocaleTimeString()}</span>
                                        </div>
                                    </div>
                                `;
                                document.getElementById('chatContainer').appendChild(div);
                            } else {
                                const model = MODELS[h.model] || MODELS[currentModel];
                                const content = h.content || h.rawContent; // 优先显示过滤后的
                                const isFiltered = h.rawContent && h.rawContent !== h.content;
                                const div = document.createElement('div');
                                div.className = 'message ai';
                                div.innerHTML = `
                                    <div class="message-avatar" style="border-color: ${model.color}">${model.icon}</div>
                                    <div class="message-content">
                                        <div class="message-bubble">
                                            ${isFiltered ? '<div class="thinking-tag">已过滤思考过程</div>' : '<div class="model-tag" style="background: ' + model.color + '20; color: ' + model.color + '; border-color: ' + model.color + '40">' + model.display + '</div>'}
                                            <div>${marked.parse(content)}</div>
                                        </div>
                                        <div class="message-footer">
                                            <button class="action-btn" onclick="copyText(this.parentElement.parentElement.querySelector('div:not([class])')?.id || '')">复制</button>
                                            <span style="font-size: 10px;">${new Date(h.time).toLocaleTimeString()}</span>
                                        </div>
                                    </div>
                                `;
                                document.getElementById('chatContainer').appendChild(div);
                            }
                        });
                        scrollToBottom();
                    }
                } catch(e) {}
            }
        }

        window.addEventListener('beforeunload', (e) => {
            if (history.length > 0) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
